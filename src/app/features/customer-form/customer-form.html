<form
  class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4"
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
>
  <label for="fullName">Full Name: </label>
  <input
    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
    id="fullName"
    type="text"
    formControlName="fullName"
    placeholder="Full Name"
  />
  <label for="fullName">Email: </label>
  <input
    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
    id="email"
    type="email"
    formControlName="email"
    placeholder="example@mail.com"
  />
  <label for="phone">Phone: </label>
  <input
    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
    id="phone"
    type="text"
    formControlName="phone"
    placeholder="+34 123 456 789"
  />
  <label for="address">Address: </label>
  <input
    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
    id="address"
    type="text"
    formControlName="address"
    placeholder="C/Calle,5 332011"
  />
  <label for="loyalty">Loyalty</label>
  <select
    formControlName="loyalty"
    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
  >
    <option [ngValue]="null" disabled>Select Loalty Level</option>
    <option value="Bronze">Bronze</option>
    <option value="Silver">Silver</option>
    <option value="Gold">Gold</option>
    <option value="Platinum">Platinum</option>
    <option value="VIP">VIP</option>
  </select>
  <label for="state">State:</label>
  <label>
    <input class="mx-3 my-2" type="radio" formControlName="state" [value]="true" /> Active
  </label>
  <label>
    <input class="mx-3 my-2" type="radio" formControlName="state" [value]="false" /> Inactive
  </label>
  <label for="image">Image: </label>
  <input
    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
    id="image"
    type="text"
    formControlName="image"
    placeholder="http://image..."
  />

  <button
    class="bg-blue-500 hover:bg-blue-700 text-white font-bold my-3 py-2 px-4 rounded"
    type="submit"
    [disabled]="!form.valid"
  >
    Submit
  </button>
</form>

<p>Form Status: {{ form.status }}</p>

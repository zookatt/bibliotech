<aside
  class="flex flex-col h-screen w-64 left-0 bg-surface-container-low dark:bg-surface-container-low border-r border-outline-variant dark:border-outline-variant fixed z-50"
>
  <div class="px-md py-lg">
    <h1
      class="font-headline-md text-headline-md font-semibold text-primary dark:text-primary-fixed"
    >
      Bibliotech
    </h1>
    <p class="text-secondary text-label-md font-label-md">Management Suite</p>
  </div>
  <nav class="flex-1 px-sm">
    <a
      class="flex items-center gap-sm px-md py-sm text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors mx-2 my-1"
      [routerLink]="'/'"
      routerLinkActive="bg-secondary-container text-on-secondary-container font-semibold rounded-lg"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
      <span class="font-label-md text-label-md">Dashboard</span>
    </a>
    <a
      class="flex items-center gap-sm px-md py-sm text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors mx-2 my-1"
      [routerLink]="'inventory'"
      routerLinkActive="bg-secondary-container text-on-secondary-container font-semibold rounded-lg"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
      <span class="font-label-md text-label-md">Inventory</span>
    </a>
    <a
      class="flex items-center gap-sm px-md py-sm text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors mx-2 my-1"
      [routerLink]="'customers'"
      routerLinkActive="bg-secondary-container text-on-secondary-container font-semibold rounded-lg"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="material-symbols-outlined" data-icon="group">group</span>
      <span class="font-label-md text-label-md">Customers</span>
    </a>
    <a
      class="flex items-center gap-sm px-md py-sm text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors mx-2 my-1"
      [routerLink]="'orders'"
      routerLinkActive="bg-secondary-container text-on-secondary-container font-semibold rounded-lg"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
      <span class="font-label-md text-label-md">Orders</span>
    </a>
    <a
      class="flex items-center gap-sm px-md py-sm text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors mx-2 my-1"
      [routerLink]="'reports'"
      routerLinkActive="bg-secondary-container text-on-secondary-container font-semibold rounded-lg"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="material-symbols-outlined" data-icon="bar_chart">bar_chart</span>
      <span class="font-label-md text-label-md">Reports</span>
    </a>
  </nav>
  <div class="px-sm py-md border-t border-outline-variant">
    <a
      class="flex items-center gap-sm px-md py-sm text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container-high transition-colors mx-2 my-1"
      [routerLink]="'settings'"
      routerLinkActive="bg-secondary-container text-on-secondary-container font-semibold rounded-lg"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="material-symbols-outlined" data-icon="settings">settings</span>
      <span class="font-label-md text-label-md">Settings</span>
    </a>
    <a
      class="flex items-center gap-sm px-md py-sm text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container-high transition-colors mx-2 my-1"
      [routerLink]="'logout'"
      routerLinkActive="bg-secondary-container text-on-secondary-container font-semibold rounded-lg"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="material-symbols-outlined" data-icon="logout">logout</span>
      <span class="font-label-md text-label-md">Logout</span>
    </a>
  </div>
</aside>
